<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inputs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body{
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #ECF0F1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background-color: white;
    }

    header h1 {
      margin: 1% 0% 1% 10%;
      color: #0080B7;
      font-size: 3vh;
    }

    .buttons {
      margin: 1% 10% 1% 0%;
      display: flex;
      flex-wrap: nowrap;
      width: 9em;
      justify-content: space-around;
    }

    header button {
      background-color: white;
      border: none;
      color: black;
      text-align: center;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
    }

    #cart {
      color: #0080B7;
    }

    section {
    display: flex;
    justify-content: center;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    form {
    display: flex;
    flex-direction: column;
    background-color: white;
    padding: 29% 25%;
    width: 34vh;
    height: 41vh;
    align-items: center;
    }

    .main-container h1 {
      margin: 20% 0;
    }

    .input {
      margin: 3% 0;
      display: flex;
      flex-direction: column;
      width: 90%;
    }

    .input label {
      color: #0080B7;
      font-weight: bold;
      font-size: 0.8em;
    }

    .input input {
      margin-top: 2.5%;
      padding: 1%;
      border: 1px solid #D0D0D0;
      border-radius: 0.3em;
    }

    .input select {
      margin-top: 2.5%;
      padding: 1%;
      border: 1px solid #D0D0D0;
      border-radius: 0.3em;
    }

    #input {
      margin-top: 2.5%;
      display: flex;
      align-self: stretch;
      margin-left: 5%;
    }

    #input label{
      color: #0080B7;
      font-weight: bold;
      font-size: 0.8em;
      margin-left: 4%;
    }

    #registrationBtn {
      margin: 9% 0px;
      border: none;
      color: white;
      background-color: #0080B7;
      padding: 5% 33%;
      border-radius: 0.3em;
      font-size: 0.7em;
    }
  </style>
</head>
<body>

  <header>
    <h1>ShopCart</h1>
    <div class="buttons">
      <button>Registration</button>
      <button id="cart">Cart</button>
    </div>
  </header>

  <section>
    <div class="main-container">
      <h1>Registration</h1>
      <form>
        <div class="input">
          <label for="username">Username</label>
          <input type="text" name="username">
        </div>

        <div class="input">
          <label for="password">Password</label>
          <input type="password" name="password" required>
        </div>
        
        <div class="input">
          <label for="repeatPassword">Repeat Password</label>
          <input type="password" name="repeatPassword" required>
        </div>
        
        <div class="input">
          <label for="gender">Gender</label>
          <select name="gender">
            <option value="1">(select one)</option>
            <option value="2">Male</option>
            <option value="3">Female</option>
          </select>
        </div>

        <div id="input">
          <input type="checkbox" name="agree">
        <label for="agree">i agree terms and conditions</label>
        </div>

        <button id="registrationBtn">Registration</button>
      </form>
    </div>
  </section>
</body>
</html>
